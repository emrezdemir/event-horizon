name: news_app
description: "Sunucusuz, cihaz üstü çeviri yapan kişisel haber okuyucu."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # HTTP & parsing
  dio: ^5.5.0+1
  html: ^0.15.4
  html_unescape: ^2.0.0
  webfeed_plus: ^0.3.2
  xml: ^6.5.0

  # Storage
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # On-device ML
  google_mlkit_translation: ^0.11.0
  google_mlkit_language_id: ^0.11.0

  # Background work
  workmanager: ^0.5.2

  # UX
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.2

flutter:
  uses-material-design: true
